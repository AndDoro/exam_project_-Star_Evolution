<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Stellar Evolution Pro Simulator</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { margin: 0; background: #020617; font-family: 'Segoe UI', sans-serif; overflow: hidden; color: #fff; }
        
        /* Layout: Chart (Left 35%) | Star (Right 65%) */
        #chart-side { 
            position: absolute; left: 0; top: 0; width: 35%; height: 100vh;
            background: rgba(15, 23, 42, 0.95); border-right: 1px solid #334155;
            padding: 20px; box-sizing: border-box; z-index: 10;
        }

        #star-side { position: absolute; right: 0; top: 0; width: 65%; height: 100vh; }

        /* Control Panel */
        #control-panel {
            position: absolute; bottom: 20px; right: 20px; width: 60%;
            background: rgba(10, 15, 30, 0.9); padding: 25px; border-radius: 24px;
            border: 1px solid #38bdf8; backdrop-filter: blur(15px); z-index: 20;
        }

        .flex-row { display: flex; justify-content: space-between; gap: 20px; margin-bottom: 15px; }
        .control-group { flex: 1; }
        
        label { font-size: 12px; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }
        input[type=range] { width: 100%; accent-color: #38bdf8; cursor: pointer; }
        
        button { 
            background: #38bdf8; color: #020617; border: none; padding: 10px 20px; 
            border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        button:hover { background: #7dd3fc; transform: translateY(-2px); }
        button.secondary { background: #1e293b; color: #fff; border: 1px solid #334155; }

        #info-box { 
            background: rgba(0,0,0,0.3); padding: 15px; border-radius: 12px; 
            font-size: 14px; line-height: 1.5; border-left: 4px solid #38bdf8; margin-top: 10px;
            height: 80px; overflow-y: auto;
        }

        .val { color: #38bdf8; font-weight: bold; }
        .badge { background: #fb7185; padding: 2px 8px; border-radius: 6px; font-size: 11px; }
    </style>
</head>
<body>

    <div id="chart-side">
        <h2 style="color: #38bdf8; margin-top: 0;">Діаграма ГР</h2>
        <p style="font-size: 12px; color: #64748b;">Трек еволюції поточної зірки</p>
        <div style="height: 400px; margin-bottom: 20px;">
            <canvas id="hrChart"></canvas>
        </div>
        <div id="star-params">
            <div class="flex-row">
                <div>Температура: <span id="vTemp" class="val">-</span> K</div>
                <div>Світність: <span id="vLum" class="val">-</span> L☉</div>
            </div>
            <div class="flex-row">
                <div>Радіус: <span id="vRad" class="val">-</span> R☉</div>
                <div>Маса: <span id="vMass" class="val">-</span> M☉</div>
            </div>
            <div style="margin-top: 10px;">
                <span class="badge">AI Класифікатор:</span> <span id="mlClass" style="color:#fb7185">Аналіз...</span>
            </div>
        </div>
    </div>

    <div id="star-side">
        <a-scene embedded vr-mode-ui="enabled: false">
            <a-sky color="#000002"></a-sky>
            
            <a-entity id="star-bg"></a-entity>

            <a-entity id="star-anchor" position="2 1.5 -8">
                <a-sphere id="star-body" radius="1" material="shader: flat;"></a-sphere>
                <a-sphere id="star-glow" radius="1.3" material="shader: flat; transparent: true; opacity: 0.3; side: double;"></a-sphere>
                <a-light id="star-light" type="point" intensity="2" distance="100"></a-light>
                
                <a-ring id="nova-ring" rotation="-90 0 0" radius-inner="0.1" radius-outer="0.2" material="opacity: 0; transparent: true; color: #fff;"></a-ring>
            </a-entity>

            <a-camera id="main-cam" position="0 1.5 0" look-controls="enabled: true" wasd-controls="enabled: false"></a-camera>
        </a-scene>
    </div>

    <div id="control-panel">
        <div class="flex-row">
            <div class="control-group">
                <label>Початкова Маса (M☉): <span id="massVal" class="val">1.0</span></label>
                <input type="range" id="massSlider" min="0.5" max="25" step="0.1" value="1.0">
            </div>
            <div class="control-group" style="display: flex; align-items: flex-end; gap: 10px;">
                <button onclick="resetSim()">Нова зірка 🎲</button>
                <button id="playBtn" class="secondary" onclick="togglePlay()">Пауза ⏸</button>
            </div>
        </div>

        <div class="flex-row">
            <div class="control-group">
                <label>Час еволюції (Млрд років)</label>
                <input type="range" id="timeSlider" min="0" max="100" value="0" step="0.1">
            </div>
            <div class="control-group">
                <label>Швидкість симуляції</label>
                <input type="range" id="speedSlider" min="1" max="50" value="10">
            </div>
        </div>

        <div id="info-box">Оберіть масу зірки та натисніть Play для початку життєвого циклу.</div>
    </div>

    <script>
        // --- 1. ПІДГОТОВКА СЕРЕДОВИЩА ---
        const bg = document.getElementById('star-bg');
        for (let i = 0; i < 300; i++) {
            let s = document.createElement('a-sphere');
            s.setAttribute('position', `${(Math.random()-0.5)*100} ${(Math.random()-0.5)*100} ${(Math.random()-0.5)*100}`);
            s.setAttribute('radius', Math.random()*0.05);
            s.setAttribute('color', '#fff');
            s.setAttribute('opacity', Math.random());
            bg.appendChild(s);
        }

        // --- 2. НАУКОВА ЛОГІКА ---
        let currentMass = 1.0;
        let isPlaying = true;
        let simTime = 0;

        function getEvolutionData(t, mass) {
            let temp, lum, rad, s_class, info, color;
            let f = t / 100; // normalized time

            // PHYSICS MODEL BASED ON MASS
            if (mass < 8) { // Малі та середні зірки (як Сонце)
                if (f < 0.15) {
                    temp = 2000 + f*20000; lum = 0.1 + f*10; rad = 5 - f*25;
                    s_class = "Протозоря"; color = "#ff7700";
                    info = "Гравітаційне стиснення. Формування ядра з газової хмари.";
                } else if (f < 0.85) {
                    let mainF = (f-0.15)/0.7;
                    temp = 5000 + (mass*500); lum = 1 * Math.pow(mass, 3.5); rad = 1 * Math.pow(mass, 0.7);
                    s_class = "Головна послідовність"; color = (mass > 2) ? "#b3e6ff" : "#ffffcc";
                    info = "Стабільне спалювання гідрогену. Гідростатична рівновага.";
                } else if (f < 0.98) {
                    temp = 3000; lum = 1000 * mass; rad = 150 * mass;
                    s_class = "Червоний гігант"; color = "#ff3300";
                    info = "Гелієвий спалах. Зоря розширилася, поглинаючи внутрішні планети.";
                } else {
                    temp = 40000; lum = 0.5; rad = 0.02;
                    s_class = "Білий карлик"; color = "#ccf2ff";
                    info = "Ядро оголене. Зоря скинула оболонку і повільно охолоджується.";
                }
            } else { // Масивні зірки (Гіганти)
                if (f < 0.9) {
                    temp = 20000 + mass*500; lum = 10000 * Math.pow(mass, 0.5); rad = 10 * mass;
                    s_class = "Блакитний надгігант"; color = "#00bbff";
                    info = "Надмасивна зірка спалює паливо з неймовірною швидкістю.";
                } else if (f < 0.99) {
                    temp = 3500; lum = 50000 * (mass/10); rad = 500 * (mass/8);
                    s_class = "Червоний надгігант"; color = "#ff0000";
                    info = "Залізне ядро формується. Зоря на межі гравітаційного колапсу.";
                } else {
                    temp = 100000; lum = 1000000; rad = 0.001;
                    s_class = "Наднова / Чорна діра"; color = "#ffffff";
                    info = "ВИБУХ НАДНОВОЇ! Гравітація перемогла. Утворився компактний об'єкт.";
                }
            }
            return { temp, lum, rad, s_class, info, color, mass };
        }

        // --- 3. CHART & UI ---
        const ctx = document.getElementById('hrChart').getContext('2d');
        const hrChart = new Chart(ctx, {
            type: 'scatter',
            data: { datasets: [{ label: 'Track', data: [], borderColor: '#38bdf8', showLine: true, pointRadius: 0 }] },
            options: {
                scales: {
                    x: { reverse: true, min: 0, max: 50000, title: {display:true, text:'Температура (K)', color:'#fff'} },
                    y: { type: 'logarithmic', min: 0.01, max: 1000000, title: {display:true, text:'Світність (L/L☉)', color:'#fff'} }
                },
                plugins: { legend: { display: false } }
            }
        });

        // --- 4. ENGINE ---
        function update(t) {
            const d = getEvolutionData(t, currentMass);
            
            // 3D Update
            const star = document.getElementById('star-body');
            const glow = document.getElementById('star-glow');
            const light = document.getElementById('star-light');
            
            // Visual scaling (logarithmic for better view)
            let vRad = Math.log10(d.rad + 1.1) * 0.8;
            star.setAttribute('radius', vRad);
            star.setAttribute('color', d.color);
            glow.setAttribute('radius', vRad * 1.4);
            glow.setAttribute('color', d.color);
            light.setAttribute('light', `color: ${d.color}; intensity: ${1 + d.lum/5000}`);

            // Text Update
            document.getElementById('vTemp').innerText = Math.floor(d.temp).toLocaleString();
            document.getElementById('vLum').innerText = d.lum.toFixed(2);
            document.getElementById('vRad').innerText = d.rad.toFixed(2);
            document.getElementById('vMass').innerText = currentMass;
            document.getElementById('info-box').innerText = d.info;
            document.getElementById('mlClass').innerText = d.s_class;
            document.getElementById('age').innerText = `ВІК: ${Math.floor(t * (150/currentMass))} МЛН РОКІВ`;

            // Chart Update
            if (hrChart.data.datasets[0].data.length > t * 2) hrChart.data.datasets[0].data = [];
            hrChart.data.datasets[0].data.push({ x: d.temp, y: d.lum });
            hrChart.update('none');

            // Effects
            if (d.s_class.includes("Гігант") && !star.getAttribute('animation')) {
                star.setAttribute('animation', 'property: scale; to: 1.1 1.1 1.1; dir: alternate; dur: 500; loop: true');
            }
        }

        // --- 5. CONTROLS ---
        const timeSlider = document.getElementById('timeSlider');
        const massSlider = document.getElementById('massSlider');
        const speedSlider = document.getElementById('speedSlider');

        massSlider.oninput = function() {
            currentMass = parseFloat(this.value);
            document.getElementById('massVal').innerText = currentMass;
            resetSim();
        };

        timeSlider.oninput = function() { simTime = parseFloat(this.value); update(simTime); };

        function togglePlay() {
            isPlaying = !isPlaying;
            document.getElementById('playBtn').innerText = isPlaying ? "Пауза ⏸" : "Грати ▶";
        }

        function resetSim() {
            simTime = 0;
            timeSlider.value = 0;
            hrChart.data.datasets[0].data = [];
            update(0);
        }

        function resetSimWithRandom() {
            massSlider.value = (Math.random() * 24 + 0.5).toFixed(1);
            massSlider.oninput();
        }

        // Camera Zoom with Wheel
        window.addEventListener('wheel', (e) => {
            const cam = document.getElementById('main-cam');
            let pos = cam.getAttribute('position');
            pos.z += e.deltaY * 0.01;
            pos.z = Math.min(Math.max(pos.z, 1), 20);
            cam.setAttribute('position', pos);
        });

        // Main Loop
        setInterval(() => {
            if (isPlaying && simTime < 100) {
                simTime += parseFloat(speedSlider.value) / 100;
                timeSlider.value = simTime;
                update(simTime);
            }
        }, 50);

        window.onload = () => update(0);
    </script>
</body>
</html>
