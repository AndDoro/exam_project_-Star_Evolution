<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>3D Star Evolution - Final Fix</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { margin: 0; background: #000; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        /* Панель керування - зроблена більш сучасною */
        #ui-panel { 
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 85%; max-width: 900px;
            background: rgba(10, 15, 30, 0.95); color: #fff; padding: 25px; 
            border-radius: 24px; border: 1px solid #334155; z-index: 100;
            box-shadow: 0 15px 50px rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
        }

        /* Контейнер графіка - збільшено */
        #chart-container { 
            position: absolute; top: 20px; left: 20px; 
            width: 400px; height: 300px; 
            background: rgba(10, 15, 30, 0.85); padding: 20px; 
            border-radius: 20px; border: 1px solid #334155; z-index: 100; 
            backdrop-filter: blur(5px);
        }

        input[type=range] { 
            width: 100%; cursor: pointer; margin: 15px 0; 
            accent-color: #38bdf8;
        }
        
        .stats-row { display: flex; justify-content: space-between; font-size: 15px; margin-top: 10px; }
        .stat-label { color: #94a3b8; }
        .stat-val { color: #38bdf8; font-weight: bold; }
        .ml-tag { 
            background: #1e293b; color: #fb7185; padding: 4px 12px; 
            border-radius: 12px; font-size: 13px; font-weight: bold;
            border: 1px solid #fb7185;
        }

        /* Стиль для A-Frame сцени */
        a-scene { width: 100%; height: 100vh; }
    </style>
</head>
<body>

    <div id="chart-container">
        <canvas id="hrChart"></canvas>
    </div>

    <div id="ui-panel">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div id="age" style="font-size: 20px; font-weight: 900; color: #38bdf8; letter-spacing: 1px;">ВІК: 0 МЛН РОКІВ</div>
            <div class="ml-tag">🤖 ML Class: <span id="mlClass">G</span></div>
        </div>
        
        <input type="range" id="timeSlider" min="0" max="100" value="0" step="0.5">
        
        <div id="info" style="font-size: 15px; color: #e2e8f0; margin-bottom: 15px; min-height: 45px; border-left: 3px solid #38bdf8; padding-left: 15px;">
            Тягніть повзунок для запуску еволюції...
        </div>
        
        <div class="stats-row">
            <div><span class="stat-label">Стадія:</span> <span id="vStage" class="stat-val">-</span></div>
            <div><span class="stat-label">Температура:</span> <span id="vTemp" class="stat-val">-</span> K</div>
            <div><span class="stat-label">Світність:</span> <span id="vLum" class="stat-val">-</span> L☉</div>
        </div>
    </div>

    <a-scene vr-mode-ui="enabled: false" shadow="type: pcfsoft">
        <a-sky color="#000005"></a-sky>
        
        <a-starfield star-count="2000" radius="200"></a-starfield>

        <a-entity id="star-system" position="0 1.5 -8">
            <a-sphere id="star-body" 
                      radius="1" 
                      material="shader: flat; transparent: false; opacity: 1;">
            </a-sphere>
            
            <a-sphere id="star-glow" 
                      radius="1.3" 
                      material="shader: flat; transparent: true; opacity: 0.3; side: double;">
            </a-sphere>

            <a-light id="star-light" type="point" intensity="2" distance="100"></a-light>
        </a-
