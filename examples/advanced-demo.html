<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>VR Star Evolution - Fixed</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { margin: 0; background: #000; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        /* Панель керування */
        #ui-panel { 
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 80%; max-width: 800px;
            background: rgba(15, 23, 42, 0.9); color: #fff; padding: 25px; 
            border-radius: 20px; border: 1px solid #334155; z-index: 100;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Контейнер графіка */
        #chart-container { 
            position: absolute; top: 20px; left: 20px; 
            width: 350px; height: 260px; 
            background: rgba(15, 23, 42, 0.85); padding: 15px; 
            border-radius: 15px; border: 1px solid #334155; z-index: 100; 
        }

        input[type=range] { width: 100%; cursor: pointer; margin: 15px 0; }
        
        .stats-row { display: flex; justify-content: space-between; font-size: 14px; }
        .stat-val { color: #38bdf8; font-weight: bold; }
        .ml-info { color: #fb7185; font-weight: bold; text-align: center; margin-top: 10px; border-top: 1px solid #334155; padding-top: 10px; }
    </style>
</head>
<body>

    <div id="chart-container">
        <canvas id="hrChart"></canvas>
    </div>

    <div id="ui-panel">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div id="age" style="font-size: 18px; font-weight: bold; color: #38bdf8;">ВІК: 0 МЛН РОКІВ</div>
            <div id="stage-name" style="text-transform: uppercase; letter-spacing: 1px; color: #94a3b8;">Підготовка...</div>
        </div>
        
        <input type="range" id="timeSlider" min="0" max="100" value="0" step="0.5">
        
        <div id="info" style="font-size: 14px; color: #cbd5e1; min-height: 40px;">Тягніть повзунок, щоб почати життєвий цикл зорі.</div>
        
        <div class="stats-row">
            <div>Температура: <span id="vTemp" class="stat-val">-</span> K</div>
            <div>Світність: <span id="vLum" class="stat-val">-</span> L☉</div>
            <div>Радіус: <span id="vRad" class="stat-val">-</span> R☉</div>
        </div>
        
        <div class="ml-info">🤖 Класифікація ML: <span id="mlClass">-</span></div>
    </div>

    <a-scene vr-mode-ui="enabled: false">
        <a-sky color="#000005"></a-sky>
        
        <a-entity id="star-anchor" position="0 1.5 -6">
            <a-sphere id="star-body" 
                      radius="1" 
                      material="shader: standard; emissiveIntensity: 1; metalness: 0; roughness: 1;">
            </a-sphere>
            
            <a-light id="star-light" type="point" intensity="1.5" distance="50"></a-light>
        </a-entity>

        <a-entity position="0 1.5 0">
            <a-camera wasd-controls-enabled="false" look-controls="enabled: true"></a-camera>
        </a-entity>
    </a-scene>

    <script type="module">
        import { getStarStats } from '../src/utils/physics.js';
        import { classifySpectralClass } from '../src/ml/star-classifier.js';

        const slider = document.getElementById('timeSlider');
        const starBody = document.getElementById('star-body');
        const starLight = document.getElementById('star-light');
        const ctx = document.getElementById('hrChart').getContext('2d');

        // Налаштування Chart.js для красивого відображення в темній темі
        Chart.defaults.color = '#94a3b8';
        const hrChart = new Chart(ctx, {
            type: 'scatter',
            data: { 
                datasets: [{ 
                    label: 'Трек еволюції', 
                    data: [], 
                    borderColor: '#38bdf8', 
                    backgroundColor: '#38bdf8',
                    showLine: true, 
                    pointRadius: 2,
                    tension: 0.3
                }] 
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: { 
                    x: { 
                        reverse: true, min: 0, max: 40000, 
                        title: { display: true, text: 'Температура T(K)', color: '#38bdf8' },
                        grid: { color: '#1e293b' }
                    },
                    y: { 
                        type: 'logarithmic', min: 0.01, max: 10000, 
                        title: { display: true, text: 'Світність L/L☉', color: '#38bdf8' },
                        grid: { color: '#1e293b' }
                    }
                },
                plugins: { legend: { display: false } }
            }
        });

        slider.addEventListener('input', (e) => {
            const t = parseFloat(e.target.value);
            const data = getStarStats(t);
            const mlClass = classifySpectralClass(data.temp);

            // 1. Оновлення 3D об'єкта (Коректне встановлення атрибутів)
            // Обмежуємо візуальний радіус, щоб він не був замалим або завеликим для екрану
            const visualRad = t < 97 ? Math.max(0.4, data.rad * 0.15) : 0.2;
            
            starBody.setAttribute('radius', visualRad);
            // Важливо: встановлюємо колір і самосвітіння (emissive)
            starBody.setAttribute('material', {
                color: data.color,
                emissive: data.color,
                emissiveIntensity: t < 97 ? 1 : 1.5
            });

            // Оновлення світла
            starLight.setAttribute('light', {
                color: data.color,
                intensity: t < 97 ? 1.5 : 2
            });

            // 2. Оновлення Текстового UI
            document.getElementById('age').innerText = `ВІК: ${Math.floor(t * 150)} МЛН РОКІВ`;
            document.getElementById('stage-name').innerText = data.s_class;
            document.getElementById('info').innerText = data.info;
            document.getElementById('vTemp').innerText = data.temp.toLocaleString();
            document.getElementById('vLum').innerText = data.lum;
            document.getElementById('vRad').innerText = data.rad;
            document.getElementById('mlClass').innerText = mlClass;

            // 3. Оновлення графіка
            // Якщо рухаємо назад — очищуємо хвіст графіка
            if (hrChart.data.datasets[0].data.length > t * 2) {
                hrChart.data.datasets[0].data = hrChart.data.datasets[0].data.slice(0, t * 2);
            }
            hrChart.data.datasets[0].data.push({ x: data.temp, y: data.lum });
            hrChart.update('none'); // Оновлення без анімації для швидкості
        });

        // Початковий стан
        window.onload = () => {
            slider.dispatchEvent(new Event('input'));
        };
    </script>
</body>
</html>
