<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Stellar Evolution Ultimate Simulator</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { margin: 0; background: #010204; font-family: 'Segoe UI', sans-serif; overflow: hidden; color: #e6edf3; }
        
        /* Layout */
        #left-panel { 
            position: absolute; left: 0; top: 0; width: 38%; height: 100vh;
            background: rgba(13, 17, 23, 0.95); border-right: 2px solid #30363d;
            padding: 25px; box-sizing: border-box; z-index: 10;
            display: flex; flex-direction: column; backdrop-filter: blur(10px);
        }

        #right-panel { position: absolute; right: 0; top: 0; width: 62%; height: 100vh; }

        /* UI Styling */
        #age-display { font-size: 26px; font-weight: 900; color: #58a6ff; text-shadow: 0 0 10px rgba(88,166,255,0.3); }
        .info-card { 
            background: #161b22; padding: 20px; border-radius: 12px; 
            border: 1px solid #30363d; font-size: 14px; line-height: 1.7;
            height: 200px; overflow-y: auto; margin-top: 20px;
            scrollbar-width: thin; scrollbar-color: #30363d #161b22;
        }

        .control-section {
            position: absolute; bottom: 25px; right: 25px; width: 58%;
            background: rgba(13, 17, 23, 0.9); padding: 25px; border-radius: 20px;
            border: 1px solid #30363d; z-index: 20; backdrop-filter: blur(10px);
        }

        .param-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 15px 0; }
        .val { color: #58a6ff; font-weight: bold; font-family: monospace; }
        input[type=range] { width: 100%; accent-color: #58a6ff; cursor: pointer; }
        button { 
            background: #21262d; color: #c9d1d9; border: 1px solid #30363d; padding: 10px 18px; 
            border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s;
        }
        button:hover { background: #30363d; color: #fff; }
        .btn-active { background: #238636 !important; color: #fff !important; }
    </style>
</head>
<body>

    <div id="left-panel">
        <h2 style="margin:0; color:#58a6ff; font-size: 20px;">Діаграма Герцшпрунга-Рассела</h2>
        <div style="flex-grow: 1; margin: 15px 0;">
            <canvas id="hrChart"></canvas>
        </div>

        <div class="param-grid">
            <div><small>Температура:</small><br><span id="vTemp" class="val">-</span> K</div>
            <div><small>Світність:</small><br><span id="vLum" class="val">-</span> L☉</div>
            <div><small>Радіус:</small><br><span id="vRad" class="val">-</span> R☉</div>
            <div><small>Маса:</small><br><span id="vMass" class="val">-</span> M☉</div>
        </div>

        <div id="info-box" class="info-card">Завантаження даних еволюції...</div>
    </div>

    <div id="right-panel">
        <a-scene embedded vr-mode-ui="enabled: false">
            <a-sky color="#000005"></a-sky>
            
            <a-entity id="stars-container"></a-entity>
            <a-entity id="nebula-bg" position="0 0 -50" scale="2 2 2">
                <a-sphere radius="50" material="shader: flat; transparent: true; opacity: 0.05; color: #440088; side: back;"></a-sphere>
                <a-sphere radius="48" material="shader: flat; transparent: true; opacity: 0.03; color: #004488; side: back;" rotation="0 45 0"></a-sphere>
            </a-entity>

            <a-entity id="star-anchor" position="0 0 -15">
                <a-sphere id="star-body" material="shader: flat;"></a-sphere>
                <a-sphere id="star-glow" material="shader: flat; transparent: true; opacity: 0.25; side: double;"></a-sphere>
                <a-light id="star-light" type="point" intensity="2" distance="200"></a-light>
                
                <a-entity id="planet-orbit">
                    <a-sphere id="distant-planet" position="15 0 0" radius="0.3" color="#444" material="roughness: 1;"></a-sphere>
                </a-entity>
            </a-entity>

            <a-camera id="main-cam" position="0 0 5" look-controls="enabled: true" wasd-controls="enabled: false"></a-camera>
        </a-scene>
    </div>

    <div class="control-section">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div>
                <div id="age-display">ВІК: 0 МЛН РОКІВ</div>
                <div id="stage-title" style="color: #8b949e; font-weight: bold; font-size: 16px;">Стадія: Ініціалізація</div>
            </div>
            <div>
                <button id="playBtn" onclick="togglePlay()" class="btn-active">ПАУЗА ⏸</button>
                <button onclick="resetSim()">RESET 🔄</button>
            </div>
        </div>

        <div style="margin: 20px 0;">
            <label style="font-size: 11px; color: #8b949e;">ЧАС ЕВОЛЮЦІЇ (ХРОНОЛОГІЯ)</label>
            <input type="range" id="timeSlider" min="0" max="100" value="0" step="0.1">
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px;">
            <div>
                <label style="font-size: 11px; color: #8b949e;">ПОЧАТКОВА МАСА: <span id="mVal" style="color:#58a6ff">1.0</span> M☉</label>
                <input type="range" id="massSlider" min="0.5" max="30" step="0.5" value="1.0">
            </div>
            <div>
                <label style="font-size: 11px; color: #8b949e;">ШВИДКІСТЬ ЧАСУ: <span id="sVal" style="color:#58a6ff">х10</span></label>
                <input type="range" id="speedSlider" min="1" max="100" value="10">
            </div>
        </div>
    </div>

    <script>
        // --- 1. ВІЗУАЛЬНЕ ОТОЧЕННЯ ---
        const starsContainer = document.getElementById('stars-container');
        for (let i = 0; i < 500; i++) {
            let s = document.createElement('a-sphere');
            let [x, y, z] = [Math.random()-0.5, Math.random()-0.5, Math.random()-0.5].map(v => v * 200);
            s.setAttribute('position', `${x} ${y} ${z}`);
            s.setAttribute('radius', Math.random()*0.1);
            s.setAttribute('color', ['#fff', '#ccf', '#fcc', '#ffc'][Math.floor(Math.random()*4)]);
            s.setAttribute('opacity', Math.random());
            starsContainer.appendChild(s);
        }

        // --- 2. ГРАФІК ГЕРЦШПРУНГА-РАССЕЛА ---
        const ctx = document.getElementById('hrChart').getContext('2d');
        const hrChart = new Chart(ctx, {
            type: 'scatter',
            data: { datasets: [{ label: 'Трек', data: [], borderColor: '#58a6ff', borderWidth: 2, showLine: true, pointRadius: 0 }] },
            options: {
                responsive: true, maintainAspectRatio: false,
                scales: {
                    x: { reverse: true, min: 2000, max: 45000, title: {display: true, text: 'Температура (K)'}, grid: {color: '#21262d'} },
                    y: { type: 'logarithmic', min: 0.001, max: 1000000, title: {display: true, text: 'Світність (L☉)'}, grid: {color: '#21262d'} }
                },
                plugins: { legend: { display: false } }
            }
        });

        // --- 3. ДЕТАЛЬНА ФІЗИЧНА МОДЕЛЬ (11 ЕТАПІВ) ---
        let simTime = 0, currentMass = 1.0, isPlaying = true;

        function getStarEvolution(t, mass) {
            let temp, lum, rad, stage, info, color;
            let f = t / 100;

            if (f < 0.08) {
                stage = "Гравітаційний колапс";
                temp = 2000; lum = 0.05; rad = 25; color = "#555";
                info = "<b>Стадія 1: Молекулярна хмара.</b> Величезна хмара газу та пилу починає стискатися під дією власної гравітації. Гравітаційна енергія перетворюється на тепло, але термоядерні реакції ще неможливі. Хмара розпадається на фрагменти, кожен з яких стане майбутньою зорею.";
            } else if (f < 0.15) {
                stage = "Формування Протозорі";
                temp = 3200; lum = 80; rad = 12; color = "#ff4500";
                info = "<b>Стадія 2: Протозоря.</b> Об'єкт стає щільним та гарячим. Він оточений залишками газового кокона. Зоря світиться за рахунок виділення гравітаційної енергії стиснення (механізм Кельвіна-Гельмгольца). Центральна температура наближається до мільйона градусів.";
            } else if (f < 0.22) {
                stage = "Зоря типу T Тельця";
                temp = 4200; lum = 10; rad = 5; color = "#ff8c00";
                info = "<b>Стадія 3: Перед-головна послідовність.</b> Зоря вже має кінцеву масу, але ще не почала стабільне спалювання гідрогену. Потужні зоряні вітри 'здувають' залишки газу навколо, роблячи зорю видимою. У цей час навколо зорі починають формуватися планетарні диски.";
            } else if (f < 0.28) {
                stage = "Запалювання ядра (ZAMS)";
                temp = 5400; lum = 0.9; rad = 1.1; color = "#ffd700";
                info = "<b>Стадія 4: Вхід на Головну послідовність.</b> Температура в центрі сягнула 10-15 мільйонів градусів. Почалася протон-протонна реакція: синтез Гелію з Гідрогену. Гідростатична рівновага встановлена — тиск випромінювання тепер балансує гравітацію.";
            } else if (f < 0.82) {
                stage = "Головна послідовність";
                temp = 5800 + (mass-1)*1200; lum = Math.pow(mass, 3.8); rad = Math.pow(mass, 0.75); 
                color = mass > 3 ? "#a0d8f0" : "#fff5e6";
                info = "<b>Стадія 5: Зрілість.</b> Найстабільніший період. Зоря спалює Гідроген у ядрі. Тривалість цього етапу залежить від маси: Сонце житиме так 10 млрд років, а масивні зорі — лише мільйони. Це 'золотий вік' зорі, коли навколо неї може існувати життя на планетах.";
            } else if (f < 0.88) {
                stage = "Вичерпання Гідрогену (Субгігант)";
                temp = 5100; lum = 8 * mass; rad = 4 * mass; color = "#ffa500";
                info = "<b>Стадія 6: Субгігант.</b> Гідроген у ядрі закінчився, утворилося гелієве ядро. Починається горіння Гідрогену в тонкому шарі навколо ядра. Зоря починає повільно розширюватися, а її поверхня — холонути.";
            } else if (f < 0.93) {
                stage = "Червоний гігант (RGB)";
                temp = 3400; lum = 1500 * mass; rad = 180 * mass; color = "#ff2200";
                info = "<b>Стадія 7: Гігант.</b> Гравітація стискає ядро, що призводить до неймовірного розширення оболонки. Зоря стає в сотні разів більшою. Якщо це Сонце, воно поглине Меркурій та Венеру. Світність зростає в тисячі разів через величезну площу поверхні.";
            } else if (f < 0.95) {
                stage = "Гелієвий спалах";
                temp = 5200; lum = 80 * mass; rad = 12 * mass; color = "#ffcc00";
                info = "<b>Стадія 8: Горіння Гелію.</b> Температура ядра сягнула 100 млн градусів. Починається синтез Карбону з Гелію (потрійний альфа-процес). Зоря трохи стискається і стає гарячішою, переходячи на так звану 'горизонтальну гілку' діаграми ГР.";
            } else if (f < 0.98) {
                stage = "Подвійне шарове горіння";
                temp = 3100; lum = 4000 * mass; rad = 280 * mass; color = "#ff4400";
                info = "<b>Стадія 9: Асимптотична гілка.</b> Гелій у ядрі вичерпано. Тепер горять два шари: гелієвий і гідрогенний. Зоря стає нестабільною, починаються потужні теплові пульсації, які викидають величезну кількість речовини в космос.";
            } else if (f < 0.996) {
                stage = "Планетарна туманність";
                temp = 15000; lum = 600; rad = 8; color = "#00ffff";
                info = "<b>Стадія 10: Скидання оболонки.</b> Зоря остаточно відкидає свої зовнішні шари, оголюючи гаряче ядро. Це іонізований газ, що світиться різними кольорами. Це один з найкрасивіших, але найкоротших моментів у житті космічного об'єкта.";
            } else {
                stage = mass < 8 ? "Білий карлик" : "Колапс ядра";
                temp = 50000; lum = 0.02; rad = 0.06; color = "#f0ffff";
                info = "<b>Стадія 11: Фінал.</b> Залишилося надщільне ядро розміром із Землю. Термоядерні реакції припинилися. Він підтримується тиском вироджених електронів. Білий карлик буде повільно холонути трильйони років, стаючи чорним карликом.";
            }
            return { temp, lum, rad, stage, info, color };
        }

        // --- 4. СКРИПТ КЕРУВАННЯ ---
        function updateSim(t) {
            const data = getStarEvolution(t, currentMass);
            const star = document.getElementById('star-body');
            const glow = document.getElementById('star-glow');
            const light = document.getElementById('star-light');

            // Візуальне масштабування: Логарифмічне + адаптивне
            // Для карлика (0.06) -> ~0.3 | Для гіганта (300) -> ~10
            const visualScale = Math.pow(data.rad, 0.45) * 0.8;
            star.setAttribute('radius', visualScale);
            star.setAttribute('color', data.color);
            glow.setAttribute('radius', visualScale * 1.4);
            glow.setAttribute('color', data.color);
            light.setAttribute('light', `intensity: ${1.8 + data.lum/8000}; color: ${data.color}; distance: ${200 + data.rad}`);

            // Анімація орбіти планети-супутника
            document.getElementById('planet-orbit').setAttribute('rotation', `0 ${t * 50} 0`);
            document.getElementById('distant-planet').setAttribute('position', `${15 + visualScale} 0 0`);

            // Текст та Час
            const timeScale = 12000 / Math.pow(currentMass, 2.3);
            const realAge = t * (timeScale / 100);
            document.getElementById('age-display').innerText = realAge > 1000 ? `ВІК: ${(realAge/1000).toFixed(2)} МЛРД РОКІВ` : `ВІК: ${realAge.toFixed(0)} МЛН РОКІВ`;
            document.getElementById('stage-title').innerText = `Стадія: ${data.stage}`;
            document.getElementById('info-box').innerHTML = data.info;
            document.getElementById('vTemp').innerText = Math.floor(data.temp).toLocaleString();
            document.getElementById('vLum').innerText = data.lum.toFixed(3);
            document.getElementById('vRad').innerText = data.rad.toFixed(2);
            document.getElementById('vMass').innerText = currentMass;

            // Графік
            if (hrChart.data.datasets[0].data.length > t * 2) hrChart.data.datasets[0].data = [];
            hrChart.data.datasets[0].data.push({ x: data.temp, y: data.lum });
            hrChart.update('none');
        }

        // Event Listeners
        const tSlider = document.getElementById('timeSlider');
        const mSlider = document.getElementById('massSlider');
        const sSlider = document.getElementById('speedSlider');

        mSlider.oninput = function() {
            currentMass = parseFloat(this.value);
            document.getElementById('mVal').innerText = currentMass;
            resetSim();
        };

        sSlider.oninput = function() {
            document.getElementById('sVal').innerText = `х${this.value}`;
        };

        tSlider.oninput = function() { 
            simTime = parseFloat(this.value); 
            updateSim(simTime); 
        };

        function togglePlay() {
            isPlaying = !isPlaying;
            document.getElementById('playBtn').innerText = isPlaying ? "ПАУЗА ⏸" : "ГРАТИ ▶";
            document.getElementById('playBtn').className = isPlaying ? "btn-active" : "";
        }

        function resetSim() {
            simTime = 0;
            tSlider.value = 0;
            hrChart.data.datasets[0].data = [];
            updateSim(0);
        }

        // НОВИЙ ПОКРАЩЕНИЙ ЗУМ (без обмежень для гіганта)
        window.addEventListener('wheel', (e) => {
            const cam = document.getElementById('main-cam');
            let pos = cam.getAttribute('position');
            pos.z += e.deltaY * 0.02;
            // Розширено зум: від -10 (всередині) до 150 (дуже далеко)
            pos.z = Math.min(Math.max(pos.z, -10), 150); 
            cam.setAttribute('position', pos);
        });

        // Loop
        setInterval(() => {
            if (isPlaying && simTime < 100) {
                simTime += parseFloat(sSlider.value) / 150;
                tSlider.value = simTime;
                updateSim(simTime);
            }
        }, 50);

        window.onload = () => updateSim(0);
    </script>
</body>
</html>
