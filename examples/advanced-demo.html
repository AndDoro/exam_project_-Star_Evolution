<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>3D Star Evolution - Emergency Fix</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { margin: 0; background: #000; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        /* Панель керування */
        #ui-panel { 
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 850px;
            background: rgba(15, 23, 42, 0.95); color: #fff; padding: 25px; 
            border-radius: 20px; border: 1px solid #334155; z-index: 100;
            box-shadow: 0 10px 50px rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
        }

        /* Контейнер графіка */
        #chart-container { 
            position: absolute; top: 20px; left: 20px; 
            width: 320px; height: 240px; 
            background: rgba(15, 23, 42, 0.85); padding: 15px; 
            border-radius: 15px; border: 1px solid #334155; z-index: 100; 
        }

        input[type=range] { width: 100%; cursor: pointer; accent-color: #38bdf8; margin: 15px 0; }
        
        .stats-row { display: flex; justify-content: space-between; font-size: 14px; margin-top: 10px; }
        .stat-val { color: #38bdf8; font-weight: bold; }
        .ml-badge { background: #1e293b; color: #fb7185; padding: 4px 10px; border-radius: 10px; font-size: 12px; font-weight: bold; border: 1px solid #fb7185; }
    </style>
</head>
<body>

    <div id="chart-container">
        <canvas id="hrChart"></canvas>
    </div>

    <div id="ui-panel">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div id="age" style="font-size: 18px; font-weight: bold; color: #38bdf8;">ВІК: 0 МЛН РОКІВ</div>
            <div class="ml-badge">🤖 ML КЛАС: <span id="mlClass">-</span></div>
        </div>
        
        <input type="range" id="timeSlider" min="0" max="100" value="0" step="0.5">
        
        <div id="info" style="font-size: 14px; color: #e2e8f0; min-height: 40px; margin-bottom: 10px; border-left: 3px solid #38bdf8; padding-left: 15px;">
            Тягніть повзунок, щоб почати симуляцію...
        </div>
        
        <div class="stats-row">
            <div>Стадія: <span id="vStage" class="stat-val">-</span></div>
            <div>Температура: <span id="vTemp" class="stat-val">-</span> K</div>
            <div>Світність: <span id="vLum" class="stat-val">-</span> L☉</div>
        </div>
    </div>

    <a-scene vr-mode-ui="enabled: false">
        <a-sky color="#000005"></a-sky>

        <a-entity id="star-system" position="0 1.5 -8">
            <a-sphere id="star-body" radius="1" material="shader: flat; color: #ff6600;"></a-sphere>
            <a-sphere id="star-glow" radius="1.2" material="shader: flat; transparent: true; opacity: 0.3; color: #ff6600;"></a-sphere>
            <a-light id="star-light" type="point" intensity="1.5" distance="50"></a-light>
        </a-entity>

        <a-camera position="0 1.5 0" wasd-controls-enabled="false"></a-camera>
    </a-scene>

    <script>
        // --- 1. ФІЗИЧНА ЛОГІКА ---
        function getPhysicsData(t) {
            let temp, lum, rad, s_class, info, color;
            let f;

            if (t < 15) { // ПРОТОЗОРЯ
                f = t / 15;
                temp = Math.floor(2000 + f * 3000);
                lum = Number((0.1 + f * 0.6).toFixed(2));
                rad = Number((6 - f * 4.5).toFixed(2));
                s_class = "Протозоря";
                info = "Гравітація стискає хмару. Температура ядра зростає.";
                color = "#ff6600";
            } else if (t < 85) { // ГОЛОВНА ПОСЛІДОВНІСТЬ
                f = (t - 15) / 70;
                temp = Math.floor(5000 + f * 1000);
                lum = Number((1.0 + f * 0.8).toFixed(2));
                rad = Number((1.0 + f * 0.4).toFixed(2));
                s_class = "Головна послідовність";
                info = "Стабільне горіння Гідрогену. Найдовша стадія життя.";
                color = "#ffffcc";
            } else if (t < 97) { // ГІГАНТ
                f = (t - 85) / 12;
                temp = Math.floor(6000 - f * 4000);
                lum = Math.floor(1.8 + f * 1200);
                rad = Number((1.4 + f * 130).toFixed(1));
                s_class = "Червоний гігант";
                info = "Гідроген вичерпано. Зоря розширюється і поглинає планети.";
                color = "#ff1a00";
            } else { // КАРЛИК
                temp = 36000; lum = 35.0; rad = 0.05;
                s_class = "Білий карлик";
                info = "Залишилося надщільне ядро. Реакції завершені.";
                color = "#b3e6ff";
            }
            return { temp, lum, rad, s_class, info, color };
        }

        // --- 2. ML КЛАСИФІКАЦІЯ ---
        function classify(temp) {
            if (temp >= 30000) return "O (Блакитна)";
            if (temp >= 10000) return "A (Біла)";
            if (temp >= 6000) return "G (Жовта)";
            if (temp >= 5000) return "K (Помаранчева)";
            return "M (Червона)";
        }

        // --- 3. ГРАФІК ---
        const ctx = document.getElementById('hrChart').getContext('2d');
        const hrChart = new Chart(ctx, {
            type: 'scatter',
            data: { 
                datasets: [{ 
                    label: 'Трек', data: [], borderColor: '#38bdf8', 
                    showLine: true, pointRadius: 0, borderWidth: 2 
                }] 
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                scales: { 
                    x: { reverse: true, min: 0, max: 40000, display: true, grid: {color: '#1e293b'} },
                    y: { type: 'logarithmic', min: 0.01, max: 10000, display: true, grid: {color: '#1e293b'} }
                },
                plugins: { legend: { display: false } }
            }
        });

        // --- 4. ГОЛОВНИЙ СКРИПТ ОНОВЛЕННЯ ---
        const slider = document.getElementById('timeSlider');
        const star = document.getElementById('star-body');
        const glow = document.getElementById('star-glow');
        const light = document.getElementById('star-light');

        function update(val) {
            const t = parseFloat(val);
            const d = getPhysicsData(t);
            const ml = classify(d.temp);

            // 3D Візуалізація
            // Формула для візуального радіуса (щоб гігант не закрив весь екран)
            const vRad = Math.pow(d.rad, 0.4) * 0.5;
            star.setAttribute('radius', vRad);
            star.setAttribute('color', d.color);
            glow.setAttribute('radius', vRad * 1.3);
            glow.setAttribute('color', d.color);
            light.setAttribute('light', `color: ${d.color}; intensity: ${1.5 + (d.lum/1000)}`);

            // Текстові дані
            document.getElementById('age').innerText = `ВІК: ${Math.floor(t * 150)} МЛН РОКІВ`;
            document.getElementById('vStage').innerText = d.s_class;
            document.getElementById('info').innerText = d.info;
            document.getElementById('vTemp').innerText = d.temp.toLocaleString();
            document.getElementById('vLum').innerText = d.lum;
            document.getElementById('mlClass').innerText = ml;

            // Графік
            if (hrChart.data.datasets[0].data.length > t * 2) {
                hrChart.data.datasets[0].data = hrChart.data.datasets[0].data.slice(0, t * 2);
            }
            hrChart.data.datasets[0].data.push({ x: d.temp, y: d.lum });
            hrChart.update('none');
        }

        // Підключаємо подію
        slider.oninput = function() { update(this.value); };

        // Запуск при завантаженні
        window.onload = () => update(0);
    </script>
</body>
</html>
